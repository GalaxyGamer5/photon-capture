<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Galerie | Photon Capture</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Photon Gallery">
    <link rel="apple-touch-icon" href="../assets/favicon.svg">
    
    <!-- Global Style -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Portal Specific Style -->
    <link rel="stylesheet" href="css/portal.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>

<body>
    <!-- Navigation -->
    <header>
        <div class="container">
            <a href="../index.html" class="logo">Photon<span>-Capture</span></a>
            <nav>
                <div class="nav-actions">
                    <span id="user-greeting" style="margin-right: 1rem; color: var(--text-secondary);">Willkommen, <span
                            id="user-name">Kunde</span></span>
                    <button id="change-pw-btn" class="btn-logout"
                        style="margin-right: 0.5rem; background: rgba(0, 242, 255, 0.1); color: var(--text-primary); border: 1px solid rgba(0, 242, 255, 0.3);">Passwort
                        ändern</button>
                    <button id="select-mode-btn" class="cta-button"
                        style="padding: 0.5rem 1.5rem; font-size: 0.9rem;">Bilder auswählen</button>
                    <button id="favorites-filter-btn" class="btn-logout" style="margin-left: 0.5rem;">❤️
                        Favoriten</button>
                    <button id="logout-btn" class="btn-logout" style="margin-left: 0.5rem;">Abmelden</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Password Change Modal -->
    <div id="pw-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div
            style="background: var(--bg-secondary); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h3 style="margin-bottom: 1.5rem; color: var(--text-primary);">Passwort ändern</h3>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Aktuelles
                    Passwort</label>
                <input type="password" id="old-pw"
                    style="width: 100%; padding: 0.8rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: white;">
            </div>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Neues
                    Passwort</label>
                <input type="password" id="new-pw"
                    style="width: 100%; padding: 0.8rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: white;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Bestätigen</label>
                <input type="password" id="confirm-pw"
                    style="width: 100%; padding: 0.8rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: white;">
            </div>

            <div style="display: flex; gap: 1rem;">
                <button id="cancel-pw-btn"
                    style="flex: 1; padding: 0.8rem; background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 8px; cursor: pointer;">Abbrechen</button>
                <button id="save-pw-btn"
                    style="flex: 1; padding: 0.8rem; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Speichern</button>
            </div>
        </div>
    </div>

    <div class="container" style="padding-top: 100px;">
        <div class="gallery-title" style="text-align: center; margin-bottom: 2rem;">
            <h1>Deine persönliche Galerie</h1>
        </div>
    </div>

    <!-- Selection Toolbar (hidden by default) -->
    <div class="selection-toolbar" id="selection-toolbar" style="display: none;">
        <div class="toolbar-content">
            <button id="select-all-btn" class="btn-primary">Alle auswählen</button>
            <button id="deselect-all-btn" class="btn-secondary">Auswahl aufheben</button>
            <span id="selection-count" class="selection-count">0 Bilder ausgewählt</span>
            <button id="download-selected-btn" class="btn-success" disabled>Ausgewählte herunterladen</button>
            <button id="cancel-selection-btn" class="btn-secondary">Abbrechen</button>
        </div>
    </div>

    <div class="gallery-grid" id="gallery-grid">
        <!-- Images will be loaded here -->
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <button class="lightbox-nav lightbox-next">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
        <img src="" alt="Gallery Image" id="lightbox-img">
        <div class="lightbox-actions">
            <!-- Favorite button -->
            <button class="lightbox-favorite" id="lightbox-favorite-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                    </path>
                </svg>
            </button>
            
            <!-- Share button -->
            <button class="lightbox-share" id="lightbox-share-btn" title="Teilen" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            </button>
            
            <!-- Download Button -->
            <a href="#" class="lightbox-download" id="lightbox-download" download>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Download
            </a>
        </div>
    </div>

    <!-- Server-side session authentication -->
    <script>
        let user = null;

        // Check session and load user data
        fetch('api/check-session.php')
            .then(r => {
                if (!r.ok) throw new Error('Not authenticated');
                return r.json();
            })
            .then(data => {
                if (!data.authenticated) {
                    window.location.href = 'index.html';
                    return;
                }

                user = data.user;
                document.getElementById('user-name').textContent = user.name;
                initializeGallery();
            })
            .catch(() => {
                window.location.href = 'index.html';
            });

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', () => {
            fetch('api/logout.php', { method: 'POST' })
                .then(() => {
                    window.location.href = 'index.html';
                })
                .catch(() => {
                    window.location.href = 'index.html';
                });
        });

        async function initializeGallery() {
            // Setup session cache buster once per page load to ensure performance
            const sessionCacheBuster = Date.now();

            // Favorites State
            let favorites = new Set();
            let showFavoritesOnly = false;
            
            try {
                const favRes = await fetch('api/get-favorites.php');
                const favData = await favRes.json();
                if (favData.success && favData.favorites) {
                    favorites = new Set(favData.favorites.map(img => parseInt(img.replace('.jpg', ''))));
                }
            } catch(e) { console.error('Error loading favorites', e); }

            // Load Images
            const galleryGrid = document.getElementById('gallery-grid');
            const imageFolder = `assets/${user.folder}`;
            const imageCount = user.imageCount || 0;

            // Advanced Selection gestures state
            let anchorIndex = -1;
            let lastShiftRange = new Set();
            let shiftTargetState = true;
            let lastShiftClickTarget = -1;
            let isDraggingToSelect = false;
            let dragTargetState = true; 
            let longPressTimer = null;
            let ignoreNextClick = false;
            let lastHoveredIdx = -1;
            let touchStartX = 0;
            let touchStartY = 0;

            function getGalleryItemIndex(el) {
                const item = el.closest('.gallery-item');
                if (!item) return -1;
                const cb = item.querySelector('input');
                return cb ? parseInt(cb.dataset.imageIndex) : -1;
            }

            function setSelectionState(index, state) {
                const cb = document.getElementById(`select-${index}`);
                if (!cb) return;
                cb.checked = state;
                if (state) selectedImages.add(index);
                else selectedImages.delete(index);
            }

            function updateSelectionHtml() {
                updateSelectionCount();
            }

            function toggleImageSelection(index, isShiftKey = false) {
                const cbList = Array.from(document.querySelectorAll('.selection-checkbox input'));
                
                if (isShiftKey && anchorIndex !== -1) {
                    let targetState = true;
                    if (index === lastShiftClickTarget) {
                        shiftTargetState = !shiftTargetState;
                        targetState = shiftTargetState;
                    } else {
                        shiftTargetState = true;
                        targetState = true;
                    }

                    // Undo previous range. This resets the items to their original unselected state.
                    lastShiftRange.forEach(idx => {
                        if (idx !== anchorIndex) setSelectionState(idx, false);
                    });
                    lastShiftRange.clear();

                    const startIndex = cbList.findIndex(c => parseInt(c.dataset.imageIndex) === anchorIndex);
                    const endIndex = cbList.findIndex(c => parseInt(c.dataset.imageIndex) === index);
                    const minIdx = Math.min(startIndex, endIndex);
                    const maxIdx = Math.max(startIndex, endIndex);

                    for (let n = minIdx; n <= maxIdx; n++) {
                        const targetImageIdx = parseInt(cbList[n].dataset.imageIndex);
                        setSelectionState(targetImageIdx, targetState);
                        if (targetState) {
                            lastShiftRange.add(targetImageIdx);
                        }
                    }
                    
                    lastShiftClickTarget = index;
                } else {
                    const cb = document.getElementById(`select-${index}`);
                    if (!cb) return;
                    const newState = !cb.checked;
                    setSelectionState(index, newState);

                    if (newState) {
                        anchorIndex = index;
                        lastShiftRange.clear();
                        lastShiftRange.add(index);
                        lastShiftClickTarget = index;
                        shiftTargetState = true;
                    } else {
                        anchorIndex = -1;
                        lastShiftRange.clear();
                        lastShiftClickTarget = -1;
                        shiftTargetState = false;
                    }
                }
                updateSelectionHtml();
            }

            function handlePointerDown(e) {
                if (e.button && e.button !== 0) return; // Only left click
                const idx = getGalleryItemIndex(e.target);
                if (idx === -1) return;

                const isTouch = e.type === 'touchstart';
                if (isTouch && e.touches && e.touches.length > 0) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                } else {
                    touchStartX = e.clientX;
                    touchStartY = e.clientY;
                }

                if (selectionMode) {
                    if (!isTouch) {
                        // Mouse immediately enters drag mode
                        isDraggingToSelect = true;
                        const cb = document.getElementById(`select-${idx}`);
                        dragTargetState = cb ? !cb.checked : true;
                        lastHoveredIdx = idx;
                    } else {
                        // Touch waits 500ms to allow native scrolling otherwise
                        longPressTimer = setTimeout(() => {
                            isDraggingToSelect = true;
                            const cb = document.getElementById(`select-${idx}`);
                            dragTargetState = cb ? !cb.checked : true;
                            ignoreNextClick = true;
                            lastHoveredIdx = idx;
                            
                            setSelectionState(idx, dragTargetState);
                            updateSelectionHtml();
                            
                            anchorIndex = idx;
                            lastShiftRange.clear();
                            lastShiftRange.add(idx);
                            lastShiftClickTarget = idx;
                            shiftTargetState = dragTargetState;
                        }, 500);
                    }
                } else {
                    // Start Long Press timer outside selection mode
                    longPressTimer = setTimeout(() => {
                        document.getElementById('select-mode-btn').click();
                        setSelectionState(idx, true);
                        updateSelectionHtml();
                        
                        anchorIndex = idx;
                        lastShiftRange.clear();
                        lastShiftRange.add(idx);
                        lastShiftClickTarget = idx;
                        shiftTargetState = true;

                        isDraggingToSelect = true;
                        dragTargetState = true;
                        ignoreNextClick = true;
                        lastHoveredIdx = idx;
                    }, 500); // 500ms hold
                }
            }

            function handlePointerMove(e) {
                let clientX = e.clientX;
                let clientY = e.clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }

                if (!isDraggingToSelect) {
                    if (longPressTimer) {
                        // Very important: don't cancel long press for microscopic 3px finger wiggles
                        let diffX = Math.abs(clientX - touchStartX);
                        let diffY = Math.abs(clientY - touchStartY);
                        if (diffX > 10 || diffY > 10) {
                            clearTimeout(longPressTimer);
                            longPressTimer = null;
                        }
                    }
                    return;
                }

                if (e.cancelable) e.preventDefault(); // Prevent scrolling while actively dragging an area

                const el = document.elementFromPoint(clientX, clientY);
                if (!el) return;

                const idx = getGalleryItemIndex(el);
                if (idx !== -1 && idx !== lastHoveredIdx) {
                    setSelectionState(idx, dragTargetState);
                    updateSelectionHtml();
                    
                    lastHoveredIdx = idx;
                    anchorIndex = idx; // Update anchor so if they shift click later it continues logically
                    lastShiftRange.clear();
                    lastShiftRange.add(idx);
                }
            }

            function handlePointerUp() {
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                isDraggingToSelect = false;
                lastHoveredIdx = -1;
            }

            // Bind Events Handlers
            galleryGrid.addEventListener('mousedown', handlePointerDown);
            galleryGrid.addEventListener('touchstart', handlePointerDown, {passive: true});
            window.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('touchmove', handlePointerMove, {passive: false}); 
            window.addEventListener('mouseup', handlePointerUp);
            window.addEventListener('touchend', handlePointerUp);

            // Ctrl+A globally for mass selection
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
                    if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
                    e.preventDefault();
                    if (!selectionMode) document.getElementById('select-mode-btn').click();
                    
                    const allCheckboxes = document.querySelectorAll('.selection-checkbox input');
                    let allSelected = true;
                    for (let cb of allCheckboxes) {
                        if (!cb.checked) {
                            allSelected = false;
                            break;
                        }
                    }
                    
                    if (allSelected && allCheckboxes.length > 0) {
                        document.getElementById('deselect-all-btn').click();
                    } else {
                        document.getElementById('select-all-btn').click();
                    }
                }
            });

            // Render Main Gallery Grid
            function renderGallery() {
                galleryGrid.innerHTML = '';

                if (imageCount > 0) {
                    for (let i = 1; i <= imageCount; i++) {
                        // Filter if favorites mode is on
                        if (showFavoritesOnly && !favorites.has(i)) continue;

                        const item = document.createElement('div');
                        item.className = 'gallery-item';
                        const isFavorite = favorites.has(i);

                        // Use secure delivery API for watermarking/protection
                        const imgSrc = `api/get-image.php?f=${user.folder}&i=${i}.jpg&thumb=1&v=${sessionCacheBuster}`;

                        item.innerHTML = `
                        <div class="selection-checkbox" style="display: none; pointer-events: none;">
                            <input type="checkbox" id="select-${i}" data-image-index="${i}">
                            <label for="select-${i}"></label>
                        </div>
                        <img src="${imgSrc}" loading="lazy" alt="Bild ${i}">
                        <div class="gallery-overlay">
                            <button class="btn-icon favorite-btn ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(event, ${i})" style="margin-right: 0.5rem;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="${isFavorite ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: ${isFavorite ? 'var(--accent-color)' : 'black'};"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </button>
                            <button class="btn-icon" onclick="openLightbox(${i})">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                            </button>
                        </div>
                    `;

                        // Add click event to intercept if selection mode is open
                        item.querySelector('img').addEventListener('click', (e) => {
                            if (ignoreNextClick) {
                                ignoreNextClick = false;
                                return;
                            }
                            if (selectionMode) {
                                toggleImageSelection(i, e.shiftKey);
                            } else {
                                openLightbox(i);
                            }
                        });

                        galleryGrid.appendChild(item);
                    }
                } else {
                    galleryGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 4rem;">Noch keine Bilder verfügbar.</p>';
                }
            }

            renderGallery();

            // Try alternative image extensions if the default .jpg fails
            window.tryNextExtension = function(img) {
                let src = img.src;
                let newSrc = null;

                if (src.includes('.jpg')) {
                    newSrc = src.replace('.jpg', '.png');
                } else if (src.includes('.png')) {
                    newSrc = src.replace('.png', '.webp');
                }
                
                if (newSrc) {
                    img.src = newSrc;
                    // If this is the lightbox image, also update the download button URL
                    if (img.id === 'lightbox-img') {
                        const dlBtn = document.getElementById('lightbox-download');
                        if (dlBtn) dlBtn.href = newSrc;
                    }
                } else {
                    img.style.opacity = '0';
                }
            };
            // Favorites Logic
            window.toggleFavorite = async function (event, index) {
                event.stopPropagation(); // Prevent lightbox opening

                // Optimistic UI update
                if (favorites.has(index)) {
                    favorites.delete(index);
                } else {
                    favorites.add(index);
                }

                renderGallery(); // Re-render to update icons

                // Sync with server
                const imgSrc = `${index}.jpg`;
                try {
                    await fetch('api/toggle-favorite.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: imgSrc })
                    });
                } catch(e) { console.error('Error saving favorite', e); }

                // Update lightbox button if open
                const lightboxImg = document.getElementById('lightbox-img');
                if (lightbox.classList.contains('active') && lightboxImg.src.includes(`${index}.jpg`)) {
                    updateLightboxFavoriteBtn(index);
                }
            };

            function updateLightboxFavoriteBtn(index) {
                const btn = document.getElementById('lightbox-favorite-btn');
                const isFavorite = favorites.has(index);
                
                btn.className = `lightbox-favorite ${isFavorite ? 'active' : ''}`;
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="${isFavorite ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>`;
                btn.onclick = (e) => toggleFavorite(e, index);
            }

            // Filter Button
            const favFilterBtn = document.getElementById('favorites-filter-btn');
            favFilterBtn.addEventListener('click', () => {
                showFavoritesOnly = !showFavoritesOnly;
                favFilterBtn.classList.toggle('active');
                favFilterBtn.style.borderColor = showFavoritesOnly ? 'var(--accent-color)' : 'var(--glass-border)';
                favFilterBtn.style.color = showFavoritesOnly ? 'var(--accent-color)' : 'var(--text-primary)';
                favFilterBtn.textContent = showFavoritesOnly ? '❤️ Alle anzeigen' : '❤️ Favoriten';
                renderGallery();
            });

            // Lightbox Logic
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const downloadBtn = document.getElementById('lightbox-download');
            let currentIndex = 1;
            
            // Zoom & Pan State
            let currentScale = 1;
            let currentX = 0;
            let currentY = 0;
            let isZoomGesture = false;

            window.openLightbox = (index) => {
                currentIndex = index;
                updateLightbox('none');
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                updateLightboxFavoriteBtn(index);
            };

            function updateLightbox(direction = null) {
                const targetIndex = currentIndex;
                const thumbSrc = `api/get-image.php?f=${user.folder}&i=${targetIndex}.jpg&thumb=1&v=${sessionCacheBuster}`;
                const fullSrc = `api/get-image.php?f=${user.folder}&i=${targetIndex}.jpg&v=${sessionCacheBuster}`;
                
                downloadBtn.href = fullSrc;

                // Reset zoom on navigation
                currentScale = 1;
                currentX = 0;
                currentY = 0;
                lightboxImg.style.transition = 'none';
                lightboxImg.style.transform = `translate(0px, 0px) scale(1)`;

                const loadHighRes = () => {
                    const highResImg = new Image();
                    highResImg.onload = () => {
                        if (lightbox.classList.contains('active') && currentIndex === targetIndex) {
                            // Swap silently to high res
                            lightboxImg.src = highResImg.src;
                        }
                    };
                    highResImg.onerror = function() { tryNextExtension(this); };
                    highResImg.src = fullSrc;
                };

                if (direction && direction !== 'none') {
                    const outClass = direction === 'next' ? 'anim-slide-out-left' : 'anim-slide-out-right';
                    const inClass = direction === 'next' ? 'anim-slide-in-right' : 'anim-slide-in-left';
                    
                    // Reset classes and force reflow to ensure animation restarts
                    lightboxImg.className = '';
                    void lightboxImg.offsetWidth; 
                    lightboxImg.classList.add(outClass);
                    
                    setTimeout(() => {
                        lightboxImg.onload = () => {
                            lightboxImg.className = inClass;
                            
                            setTimeout(() => {
                                lightboxImg.classList.remove(inClass);
                            }, 180);
                            lightboxImg.onload = null;
                            loadHighRes();
                        };
                        lightboxImg.onerror = function() { tryNextExtension(this); };
                        
                        lightboxImg.src = thumbSrc;
                    }, 140);
                } else {
                    lightboxImg.src = thumbSrc;
                    lightboxImg.onerror = function() { tryNextExtension(this); };
                    loadHighRes();
                }
                updateLightboxFavoriteBtn(targetIndex);
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);

            document.querySelector('.lightbox-prev').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentIndex > 1) {
                    currentIndex--;
                } else {
                    currentIndex = imageCount; // Loop
                }
                updateLightbox('prev');
            });

            document.querySelector('.lightbox-next').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentIndex < imageCount) {
                    currentIndex++;
                } else {
                    currentIndex = 1; // Loop
                }
                updateLightbox('next');
            });

            // Close on background click
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // Keyboard nav
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') document.querySelector('.lightbox-prev').click();
                if (e.key === 'ArrowRight') document.querySelector('.lightbox-next').click();
            });

            // Touch Swipe & Zoom Gestures
            let touchStartX = 0;
            let touchStartY = 0;
            let initialPinchDistance = null;

            lightbox.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) {
                    isZoomGesture = true; // Mark entire gesture as a zoom
                    return;
                }
                if (e.touches.length === 1) {
                    isZoomGesture = false;
                }
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            lightbox.addEventListener('touchend', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (isZoomGesture) return; // Completely ignore swipe logic if they were zooming
                
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                const swipeThreshold = 50;

                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    // Horizontal swipe
                    if (Math.abs(deltaX) > swipeThreshold) {
                        if (deltaX > 0) {
                            document.querySelector('.lightbox-prev').click();
                        } else {
                            document.querySelector('.lightbox-next').click();
                        }
                    }
                } else {
                    // Vertical swipe
                    if (Math.abs(deltaY) > swipeThreshold) {
                        closeLightbox();
                    }
                }
            }, { passive: true });

            // Pinch-to-Zoom and Pan logic
            let initialScale = 1;
            let pinchCenterX = 0;
            let pinchCenterY = 0;
            let isDragging = false;
            let startDragX = 0;
            let startDragY = 0;

            lightboxImg.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    initialPinchDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    initialScale = currentScale;
                    pinchCenterX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    pinchCenterY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    lightboxImg.style.transition = 'none';
                } else if (e.touches.length === 1 && currentScale > 1) {
                    isDragging = true;
                    startDragX = e.touches[0].pageX - currentX;
                    startDragY = e.touches[0].pageY - currentY;
                    lightboxImg.style.transition = 'none';
                }
            }, { passive: false });

            lightboxImg.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && initialPinchDistance) {
                    e.preventDefault(); // prevent native scroll
                    
                    const currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    
                    const newScale = Math.max(1, Math.min(initialScale * (currentDistance / initialPinchDistance), 5.0));
                    const ratio = newScale / currentScale;
                    
                    const newPinchCenterX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
                    const newPinchCenterY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
                    
                    const windowCenterX = window.innerWidth / 2;
                    const windowCenterY = window.innerHeight / 2;
                    
                    // Zoom towards original pinch center
                    const deltaX = pinchCenterX - windowCenterX - currentX;
                    const deltaY = pinchCenterY - windowCenterY - currentY;
                    
                    currentX -= deltaX * (ratio - 1);
                    currentY -= deltaY * (ratio - 1);
                    
                    // Pan according to fingers moving across the screen while pinching
                    currentX += (newPinchCenterX - pinchCenterX);
                    currentY += (newPinchCenterY - pinchCenterY);
                    
                    currentScale = newScale;
                    pinchCenterX = newPinchCenterX;
                    pinchCenterY = newPinchCenterY;
                    
                    lightboxImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
                    
                } else if (e.touches.length === 1 && isDragging && currentScale > 1) {
                    e.preventDefault();
                    currentX = e.touches[0].pageX - startDragX;
                    currentY = e.touches[0].pageY - startDragY;
                    lightboxImg.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
                }
            }, { passive: false });

            lightboxImg.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    initialPinchDistance = null;
                }
                if (e.touches.length === 0) {
                    isDragging = false;
                    // If user zoomed out past 1.05, perfectly snap back to 1.0
                    if (currentScale <= 1.05) {
                        currentScale = 1;
                        currentX = 0;
                        currentY = 0;
                        lightboxImg.style.transition = 'transform 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                        lightboxImg.style.transform = 'translate(0px, 0px) scale(1)';
                    }
                } else if (e.touches.length === 1 && currentScale > 1) {
                    // Transitioning from a pinch to a single finger pan without lifting off
                    isDragging = true;
                    startDragX = e.touches[0].pageX - currentX;
                    startDragY = e.touches[0].pageY - currentY;
                }
            }, { passive: true });

            // Web Share API
            if (navigator.share) {
                const shareBtn = document.getElementById('lightbox-share-btn');
                shareBtn.style.display = 'flex';
                shareBtn.addEventListener('click', async () => {
                    try {
                        const apiSrc = downloadBtn.href;
                        // For modern devices, try sharing the File directly to invoke WhatsApp/Insta payload
                        const response = await fetch(apiSrc);
                        const blob = await response.blob();
                        const file = new File([blob], `PhotonCapture-${currentIndex}.jpg`, { type: blob.type });
                        
                        if (navigator.canShare && navigator.canShare({ files: [file] })) {
                            await navigator.share({
                                files: [file],
                                title: 'Photon Capture',
                                text: 'Schau dir dieses Foto an!'
                            });
                        } else {
                            throw new Error('Fallback');
                        }
                    } catch (error) {
                        // Fallback to URL
                        try {
                            await navigator.share({
                                title: 'Photon Capture',
                                text: 'Schau dir dieses Foto an!',
                                url: window.location.origin + window.location.pathname
                            });
                        } catch(e) {}
                    }
                });
            }

            // Selection Mode
            let selectionMode = false;
            const selectedImages = new Set();

            document.getElementById('select-mode-btn').addEventListener('click', () => {
                selectionMode = true;
                document.getElementById('selection-toolbar').style.display = 'flex';
                document.getElementById('select-mode-btn').style.display = 'none';
                document.querySelectorAll('.selection-checkbox').forEach(cb => cb.style.display = 'flex');
                document.querySelectorAll('.gallery-item').forEach(item => item.classList.add('selection-active'));
            });

            document.getElementById('cancel-selection-btn').addEventListener('click', () => {
                exitSelectionMode();
            });

            function exitSelectionMode() {
                selectionMode = false;
                selectedImages.clear();
                document.getElementById('selection-toolbar').style.display = 'none';
                document.getElementById('select-mode-btn').style.display = 'block';
                document.querySelectorAll('.selection-checkbox').forEach(cb => {
                    cb.style.display = 'none';
                    cb.querySelector('input').checked = false;
                });
                document.querySelectorAll('.gallery-item').forEach(item => item.classList.remove('selection-active'));
                updateSelectionCount();
            }

            document.getElementById('select-all-btn').addEventListener('click', () => {
                document.querySelectorAll('.selection-checkbox input').forEach(cb => {
                    cb.checked = true;
                    selectedImages.add(parseInt(cb.dataset.imageIndex));
                });
                updateSelectionCount();
            });

            document.getElementById('deselect-all-btn').addEventListener('click', () => {
                document.querySelectorAll('.selection-checkbox input').forEach(cb => {
                    cb.checked = false;
                });
                selectedImages.clear();
                updateSelectionCount();
            });

            // Handle checkbox changes
            document.addEventListener('change', (e) => {
                if (e.target.matches('.selection-checkbox input')) {
                    const index = parseInt(e.target.dataset.imageIndex);
                    if (e.target.checked) {
                        selectedImages.add(index);
                    } else {
                        selectedImages.delete(index);
                    }
                    updateSelectionCount();
                }
            });

            function updateSelectionCount() {
                const count = selectedImages.size;
                document.getElementById('selection-count').textContent = `${count} Bild${count !== 1 ? 'er' : ''} ausgewählt`;
                document.getElementById('download-selected-btn').disabled = count === 0;
            }

            // Download selected images as ZIP
            document.getElementById('download-selected-btn').addEventListener('click', async () => {
                if (selectedImages.size === 0) return;

                // Check for local file protocol
                if (window.location.protocol === 'file:') {
                    alert('⚠️ WICHTIG:\n\nDer ZIP-Download funktioniert aus Sicherheitsgründen nicht bei lokalen Dateien (file://).\n\nBitte starte einen lokalen Server (z.B. "php -S localhost:8000") oder lade die Website auf einen Server hoch, damit dieses Feature funktioniert.');
                    return;
                }

                const downloadBtn = document.getElementById('download-selected-btn');
                const originalText = downloadBtn.textContent;
                downloadBtn.disabled = true;
                downloadBtn.textContent = 'Erstelle ZIP-Datei...';

                try {
                    // Create new ZIP file
                    const zip = new JSZip();
                    const imagesToDownload = Array.from(selectedImages).sort((a, b) => a - b);
                    let addedCount = 0;

                    // Add each image to the ZIP
                    for (let i = 0; i < imagesToDownload.length; i++) {
                        const index = imagesToDownload[i];
                        const imgSrc = `${imageFolder}/${index}.jpg`;

                        downloadBtn.textContent = `Bild ${i + 1}/${imagesToDownload.length} wird hinzugefügt...`;

                        try {
                            // Fetch via secure delivery API to maintain protection
                            const apiSrc = `api/get-image.php?f=${user.folder}&i=${index}.jpg`;
                            let response = await fetch(apiSrc);
                            
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                            const blob = await response.blob();

                            // Add to ZIP (API returns JPG)
                            zip.file(`Bild_${String(index).padStart(3, '0')}.jpg`, blob);
                            addedCount++;
                        } catch (err) {
                            console.error(`Error adding image ${index} to ZIP:`, err);
                        }
                    }

                    if (addedCount === 0) {
                        throw new Error('Keine Bilder konnten geladen werden (CORS/Netzwerkfehler).');
                    }

                    // Generate ZIP file
                    downloadBtn.textContent = 'Erstelle Download...';
                    const zipBlob = await zip.generateAsync({ type: 'blob' });

                    // Create filename with user name and date
                    const today = new Date();
                    const dateStr = today.toISOString().split('T')[0];
                    const filename = `${user.name}_Bilder_${dateStr}.zip`;

                    // Download the ZIP file
                    saveAs(zipBlob, filename);

                    downloadBtn.textContent = 'Download abgeschlossen!';
                    setTimeout(() => {
                        downloadBtn.textContent = originalText;
                        downloadBtn.disabled = false;
                        exitSelectionMode();
                    }, 1500);

                } catch (error) {
                    console.error('ZIP creation error:', error);
                    alert('Fehler beim Erstellen der ZIP-Datei.');
                    downloadBtn.textContent = originalText;
                    downloadBtn.disabled = false;
                }
            });

            // --- Password Change Logic ---
            const pwModal = document.getElementById('pw-modal');
            const changePwBtn = document.getElementById('change-pw-btn');
            const cancelPwBtn = document.getElementById('cancel-pw-btn');
            const savePwBtn = document.getElementById('save-pw-btn');

            changePwBtn.addEventListener('click', () => {
                pwModal.style.display = 'flex';
            });

            cancelPwBtn.addEventListener('click', () => {
                pwModal.style.display = 'none';
            });

            savePwBtn.addEventListener('click', async () => {
                const oldPw = document.getElementById('old-pw').value;
                const newPw = document.getElementById('new-pw').value;
                const confirmPw = document.getElementById('confirm-pw').value;

                if (!oldPw || !newPw || !confirmPw) {
                    alert("Bitte alle Felder ausfüllen.");
                    return;
                }

                if (newPw !== confirmPw) {
                    alert("Die neuen Passwörter stimmen nicht überein.");
                    return;
                }

                // Client-side hashing (SHA-1 to match existing system)
                async function sha1(message) {
                    const msgBuffer = new TextEncoder().encode(message);
                    const hashBuffer = await crypto.subtle.digest('SHA-1', msgBuffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                }

                savePwBtn.disabled = true;
                savePwBtn.textContent = "Speichert...";

                try {
                    const oldHash = await sha1(oldPw);
                    const newHash = await sha1(newPw);

                    const response = await fetch('api/change_password.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            userId: user.id,
                            oldPasswordHash: oldHash,
                            newPasswordHash: newHash
                        })
                    });

                    const result = await response.json();

                    if (result.success) {
                        alert("Passwort erfolgreich geändert!");
                        pwModal.style.display = 'none';
                        // Clear fields
                        document.getElementById('old-pw').value = '';
                        document.getElementById('new-pw').value = '';
                        document.getElementById('confirm-pw').value = '';
                    } else {
                        alert("Fehler: " + (result.message || "Unbekannter Fehler"));
                    }
                } catch (e) {
                    console.error(e);
                    alert("Verbindungsfehler beim Speichern.");
                } finally {
                    savePwBtn.disabled = false;
                    savePwBtn.textContent = "Speichern";
                }
            });

            // Register Service Worker for PWA
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js')
                        .then(registration => console.log('SW registered:', registration))
                        .catch(error => console.error('SW registration failed:', error));
                });
            }

            // Disable mobile's disruptive long-press menu over images so our native 500ms gestures rule
            document.getElementById('gallery-grid').addEventListener('contextmenu', e => {
                if (e.target.tagName === 'IMG' || e.target.closest('.gallery-item')) {
                    e.preventDefault();
                }
            });

        } // End of initializeGallery
    </script>
</body>
