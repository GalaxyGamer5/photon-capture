<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos Hochladen | Photon Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .upload-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            background: var(--surface-dark);
            transition: all 0.3s ease;
            cursor: pointer;
            margin: 2rem 0;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent);
            background: rgba(var(--accent-rgb), 0.05);
        }

        .upload-zone svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .file-input {
            display: none;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-light);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-item .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255, 77, 77, 0.9);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--surface-light);
            border-radius: 2px;
            overflow: hidden;
            margin: 1rem 0;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="welcome-text">
                <h1>Fotos Hochladen</h1>
                <p><a href="dashboard.html" style="color: var(--accent); text-decoration: none;">&larr; Zurück zum
                        Dashboard</a></p>
            </div>
        </header>

        <div class="upload-container">
            <div class="form-group">
                <label for="gallery-select">Galerie wählen</label>
                <select id="gallery-select" class="form-control">
                    <option value="">Lade Galerien...</option>
                </select>
            </div>

            <div class="upload-zone" id="upload-zone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <h3>Klicken oder Dateien hierher ziehen</h3>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">JPG oder PNG</p>
                <input type="file" id="file-input" class="file-input" multiple accept="image/jpeg,image/png,image/jpg">
            </div>

            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="preview-grid" id="preview-grid"></div>

            <button id="upload-btn" class="btn" style="width: 100%; margin-top: 2rem;" disabled>
                Fotos Hochladen
            </button>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('photon_admin_auth') !== 'true') window.location.href = 'index.html';

        const gallerySelect = document.getElementById('gallery-select');
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewGrid = document.getElementById('preview-grid');
        const uploadBtn = document.getElementById('upload-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');

        let selectedFiles = [];

        // Load galleries
        fetch('api/list-galleries.php')
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    gallerySelect.innerHTML = '<option value="">Galerie wählen...</option>';
                    data.galleries.forEach(g => {
                        const option = document.createElement('option');
                        option.value = g.id;
                        option.textContent = `${g.name} (${g.imageCount} Bilder)`;
                        gallerySelect.appendChild(option);
                    });
                }
            });

        // Click to select files
        uploadZone.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            selectedFiles = [...files];
            updatePreview();
            uploadBtn.disabled = selectedFiles.length === 0 || !gallerySelect.value;
        }

        function updatePreview() {
            previewGrid.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';
                    item.innerHTML = `
                        <img src="${e.target.result}" alt="Preview">
                        <button class="remove-btn" onclick="removeFile(${index})">×</button>
                    `;
                    previewGrid.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updatePreview();
            uploadBtn.disabled = selectedFiles.length === 0 || !gallerySelect.value;
        }

        gallerySelect.addEventListener('change', () => {
            uploadBtn.disabled = selectedFiles.length === 0 || !gallerySelect.value;
        });

        uploadBtn.addEventListener('click', async () => {
            if (!gallerySelect.value || selectedFiles.length === 0) return;

            const formData = new FormData();
            formData.append('galleryId', gallerySelect.value);
            selectedFiles.forEach(file => formData.append('photos[]', file));

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Hochladen...';
            progressBar.classList.add('active');
            progressFill.style.width = '0%';

            try {
                const xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressFill.style.width = percent + '%';
                    }
                });

                xhr.onload = () => {
                    const result = JSON.parse(xhr.responseText);
                    if (result.success) {
                        alert(`✓ ${result.uploaded} Fotos hochgeladen!\nNeue Gesamtzahl: ${result.newTotal}`);
                        if (result.errors.length > 0) {
                            console.warn('Errors:', result.errors);
                        }
                        // Reset
                        selectedFiles = [];
                        fileInput.value = '';
                        updatePreview();
                        progressBar.classList.remove('active');
                        uploadBtn.textContent = 'Fotos Hochladen';
                        uploadBtn.disabled = true;
                        // Reload galleries to update counts
                        location.reload();
                    } else {
                        alert('Fehler: ' + result.error);
                        uploadBtn.disabled = false;
                        uploadBtn.textContent = 'Fotos Hochladen';
                    }
                };

                xhr.onerror = () => {
                    alert('Verbindungsfehler');
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'Fotos Hochladen';
                    progressBar.classList.remove('active');
                };

                xhr.open('POST', 'api/upload-photos.php');
                xhr.send(formData);
            } catch (error) {
                console.error(error);
                alert('Fehler beim Hochladen');
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Fotos Hochladen';
                progressBar.classList.remove('active');
            }
        });
    </script>
</body>

</html>
