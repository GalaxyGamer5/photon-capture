; PHP per-directory config for the admin panel
; PHP-FPM picks this up automatically (no restart needed, ~5 min cache)
; These override /etc/php/8.3/fpm/php.ini for requests inside this folder.

; [SINGULAR FILE LIMIT] Allow an individual file to be up to 20 MB
upload_max_filesize = 20M

; [TOTAL BATCH LIMIT] Allow all files combined in one upload to be up to 500 MB
post_max_size = 500M

; max_execution_time during upload (10 minutes)
max_execution_time = 600

; max_input_time (time to receive the request, 15 minutes)
max_input_time = 900
