; PHP per-directory config for the admin panel
; PHP-FPM picks this up automatically (no restart needed, ~5 min cache)
; These override /etc/php/8.3/fpm/php.ini for requests inside this folder.

; Allow massive individual files (e.g. huge TIFFs or uncompressed raw)
upload_max_filesize = 100M

; Allow total POST body up to 15 GB (100 MB * 150 files, or 50 MB * 300 files)
post_max_size = 15000M

; max_execution_time during upload (15 minutes for immense network transfers)
max_execution_time = 900

; max_input_time (time to receive the request, 30 minutes for slow upload speeds)
max_input_time = 1800
