; PHP per-directory config for the admin panel
; PHP-FPM picks this up automatically (no restart needed, ~5 min cache)
; These override /etc/php/8.3/fpm/php.ini for requests inside this folder.

; Allow up to 20 MB per individual file
upload_max_filesize = 20M

; Allow total POST body up to 4 GB (200 files × 20 MB = 4000 MB)
post_max_size = 4000M

; max_execution_time during upload (5 minutes)
max_execution_time = 300

; max_input_time (time to receive the request, 10 minutes for large batches)
max_input_time = 600
