<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathek | Photon Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* ── Filters ── */
        .filters { margin-bottom: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 0.45rem 1.2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ── Selection toolbar ── */
        .selection-toolbar {
            display: none;
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-secondary, #1a1a2e);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            margin-bottom: 1.5rem;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .selection-toolbar.visible { display: flex; }
        .toolbar-count { font-weight: 600; color: var(--accent, #00f2ff); flex: 1; min-width: max-content; }
        .toolbar-btn {
            padding: 0.45rem 1.1rem; border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.85rem; font-weight: 600; transition: opacity 0.2s;
        }
        .toolbar-btn:hover { opacity: 0.85; }
        .btn-select-all { background: rgba(255,255,255,0.1); color: white; }
        .btn-deselect { background: rgba(255,255,255,0.05); color: var(--text-secondary, #aaa); border: 1px solid rgba(255,255,255,0.1); }
        .btn-download { background: #3a86ff; color: white; }
        .btn-delete { background: #e63946; color: white; }
        .btn-cancel { background: transparent; color: var(--text-secondary, #aaa); border: 1px solid rgba(255,255,255,0.1); }

        /* ── Grid ── */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }

        /* ── Card ── */
        .photo-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }
        .photo-card:hover { transform: translateY(-4px); }
        .photo-card.selected {
            border-color: var(--accent, #00f2ff);
            box-shadow: 0 0 0 2px var(--accent, #00f2ff);
        }

        /* Checkbox overlay */
        .card-checkbox {
            position: absolute; top: 0.6rem; left: 0.6rem;
            width: 22px; height: 22px;
            border-radius: 6px; border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.15s;
            z-index: 2;
        }
        .card-checkbox svg { display: none; }
        .selection-mode .card-checkbox { opacity: 1; }
        .photo-card.selected .card-checkbox {
            background: var(--accent, #00f2ff);
            border-color: var(--accent, #00f2ff);
        }
        .photo-card.selected .card-checkbox svg { display: block; }

        .photo-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .photo-info { padding: 0.75rem 1rem; font-size: 0.78rem; }
        .photo-name { font-weight: 600; margin-bottom: 0.2rem; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .photo-meta { color: var(--text-secondary, #888); display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 0.62rem; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.03em; }
        .badge-portfolio { background: #4a90e2; color: white; }
        .badge-gallerien { background: #e2a04a; color: white; }

        /* ── Modal ── */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; padding: 2rem; }
        .modal.open { display: flex; }
        .modal-content { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; color: white; font-size: 2rem; cursor: pointer; line-height: 1; }

        /* ── Enter-selection mode button ── */
        .select-mode-btn { margin-left: auto; }

        /* ── Progress toast ── */
        #toast {
            display: none; position: fixed; bottom: 2rem; right: 2rem;
            background: #1e1e3a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 1rem 1.5rem;
            color: white; font-size: 0.9rem; z-index: 9999;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="welcome-text">
                <a href="dashboard.html" style="color:var(--accent);text-decoration:none;font-size:0.9rem;margin-bottom:0.5rem;display:block;">&larr; Zurück zum Dashboard</a>
                <h1>Mediathek</h1>
                <p>Alle hochgeladenen Fotos auf deinem Server</p>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:center;">
                <div id="stats-badge" class="filter-btn" style="cursor:default;">Lädt...</div>
                <button id="enter-select-btn" class="btn select-mode-btn" onclick="enterSelectionMode()">Auswählen</button>
            </div>
        </header>

        <!-- Selection toolbar -->
        <div class="selection-toolbar" id="selection-toolbar">
            <span class="toolbar-count" id="toolbar-count">0 ausgewählt</span>
            <button class="toolbar-btn btn-select-all" onclick="selectAll()">Alle auswählen</button>
            <button class="toolbar-btn btn-deselect" onclick="deselectAll()">Auswahl aufheben</button>
            <button class="toolbar-btn btn-download" id="download-btn" onclick="downloadSelected()" disabled>⬇ Herunterladen</button>
            <button class="toolbar-btn btn-delete" id="delete-btn" onclick="deleteSelected()" disabled>🗑 Löschen</button>
            <button class="toolbar-btn btn-cancel" onclick="exitSelectionMode()">Abbrechen</button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterPhotos('all')">Alle</button>
            <button class="filter-btn" onclick="filterPhotos('Portfolio')">Portfolio</button>
            <button class="filter-btn" onclick="filterPhotos('Gallerien')">Kundenbilder</button>
        </div>

        <div class="grid" id="photo-grid"><!-- Photos via JS --></div>
    </div>

    <!-- Lightbox modal -->
    <div id="photo-modal" class="modal" onclick="closeModal(event)">
        <span class="close-modal" onclick="document.getElementById('photo-modal').classList.remove('open')">&times;</span>
        <img id="modal-img" class="modal-content">
    </div>

    <!-- Progress toast -->
    <div id="toast"></div>

    <script>
        if (sessionStorage.getItem('photon_admin_auth') !== 'true') window.location.href = 'index.html';

        let allPhotos = [];
        let filteredPhotos = [];
        let currentFilter = 'all';
        let selectionMode = false;
        const selected = new Set(); // stores photo.path

        // ──────────────────────────────────────────
        // Fetch & Render
        // ──────────────────────────────────────────
        async function fetchPhotos() {
            try {
                const res = await fetch('api/get-all-server-photos.php');
                const data = await res.json();
                allPhotos = data.photos || [];
                document.getElementById('stats-badge').textContent = `${data.count} Fotos gefunden`;
                renderPhotos();
            } catch (e) {
                document.getElementById('photo-grid').innerHTML = '<p style="color:#ff6b6b">Fehler beim Laden der Fotos</p>';
            }
        }

        function renderPhotos() {
            const grid = document.getElementById('photo-grid');
            filteredPhotos = currentFilter === 'all' ? allPhotos : allPhotos.filter(p => p.source === currentFilter);

            if (filteredPhotos.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-secondary);grid-column:1/-1;text-align:center;padding:3rem">Keine Fotos gefunden.</p>';
                return;
            }

            grid.innerHTML = filteredPhotos.map((p, i) => `
                <div class="photo-card ${selected.has(p.path) ? 'selected' : ''}"
                     data-index="${i}"
                     onclick="handleCardClick(event, ${i})">
                    <div class="card-checkbox">
                        <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                            <path d="M1 4.5L5 8.5L12 1" stroke="#0a0a1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <img src="${p.url}" class="photo-img" loading="lazy"
                         onerror="this.style.background='#1a1a2e';this.style.minHeight='160px';">
                    <div class="photo-info">
                        <div class="photo-name" title="${p.name}">${p.name}</div>
                        <div class="photo-meta">
                            <span>${p.size || '–'}</span>
                            <span class="badge badge-${p.source.toLowerCase()}">${p.source}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            if (selectionMode) grid.classList.add('selection-mode');
        }

        // ──────────────────────────────────────────
        // Card click: lightbox or toggle selection
        // ──────────────────────────────────────────
        function handleCardClick(e, index) {
            const photo = filteredPhotos[index];
            if (selectionMode) {
                toggleSelect(photo.path);
                renderPhotos();
            } else {
                openModal(photo.url);
            }
        }

        // ──────────────────────────────────────────
        // Selection
        // ──────────────────────────────────────────
        function enterSelectionMode() {
            selectionMode = true;
            document.getElementById('selection-toolbar').classList.add('visible');
            document.getElementById('photo-grid').classList.add('selection-mode');
            document.getElementById('enter-select-btn').style.display = 'none';
        }

        function exitSelectionMode() {
            selectionMode = false;
            selected.clear();
            document.getElementById('selection-toolbar').classList.remove('visible');
            document.getElementById('photo-grid').classList.remove('selection-mode');
            document.getElementById('enter-select-btn').style.display = '';
            updateToolbar();
            renderPhotos();
        }

        function toggleSelect(path) {
            if (selected.has(path)) selected.delete(path);
            else selected.add(path);
            updateToolbar();
        }

        function selectAll() {
            filteredPhotos.forEach(p => selected.add(p.path));
            updateToolbar();
            renderPhotos();
        }

        function deselectAll() {
            filteredPhotos.forEach(p => selected.delete(p.path));
            updateToolbar();
            renderPhotos();
        }

        function updateToolbar() {
            const n = selected.size;
            document.getElementById('toolbar-count').textContent = `${n} ausgewählt`;
            document.getElementById('download-btn').disabled = n === 0;
            document.getElementById('delete-btn').disabled = n === 0;
        }

        // ──────────────────────────────────────────
        // Download selected as ZIP
        // ──────────────────────────────────────────
        async function downloadSelected() {
            const paths = [...selected];
            if (paths.length === 0) return;

            showToast(`Erstelle ZIP für ${paths.length} Bild(er)...`);

            const zip = new JSZip();
            let added = 0;

            for (const path of paths) {
                const photo = allPhotos.find(p => p.path === path);
                if (!photo) continue;
                try {
                    const res = await fetch(photo.url);
                    if (!res.ok) continue;
                    const blob = await res.blob();
                    zip.file(photo.name, blob);
                    added++;
                    showToast(`${added}/${paths.length} Bilder verarbeitet...`);
                } catch (e) { /* skip */ }
            }

            if (added === 0) { showToast('Fehler: Keine Bilder konnten geladen werden.', true); return; }

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const date = new Date().toISOString().split('T')[0];
            saveAs(zipBlob, `Mediathek_${date}.zip`);
            hideToast();
        }

        // ──────────────────────────────────────────
        // Delete selected
        // ──────────────────────────────────────────
        async function deleteSelected() {
            const paths = [...selected];
            if (paths.length === 0) return;
            if (!confirm(`${paths.length} Bild(er) wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`)) return;

            showToast(`Lösche ${paths.length} Bild(er)...`);

            try {
                const res = await fetch('api/delete-media.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paths })
                });
                const data = await res.json();
                if (data.success) {
                    selected.clear();
                    updateToolbar();
                    hideToast();
                    await fetchPhotos(); // Reload the list
                    if (data.errors && data.errors.length > 0) {
                        alert('Einige Bilder konnten nicht gelöscht werden:\n' + data.errors.join('\n'));
                    }
                } else {
                    showToast('Fehler: ' + (data.error || 'Unbekannt'), true);
                }
            } catch (e) {
                showToast('Netzwerkfehler beim Löschen.', true);
            }
        }

        // ──────────────────────────────────────────
        // Filter
        // ──────────────────────────────────────────
        function filterPhotos(source) {
            currentFilter = source;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const label = btn.textContent.trim();
                const match = source === 'all' ? label === 'Alle'
                            : source === 'Portfolio' ? label === 'Portfolio'
                            : label === 'Kundenbilder';
                btn.classList.toggle('active', match);
            });
            selected.clear();
            updateToolbar();
            renderPhotos();
        }

        // ──────────────────────────────────────────
        // Modal
        // ──────────────────────────────────────────
        function openModal(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('photo-modal').classList.add('open');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('photo-modal')) {
                document.getElementById('photo-modal').classList.remove('open');
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('photo-modal').classList.remove('open');
        });

        // ──────────────────────────────────────────
        // Toast
        // ──────────────────────────────────────────
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.borderColor = isError ? '#e63946' : 'rgba(255,255,255,0.1)';
            if (isError) setTimeout(hideToast, 3000);
        }
        function hideToast() { document.getElementById('toast').style.display = 'none'; }

        // ──────────────────────────────────────────
        // Init
        // ──────────────────────────────────────────
        fetchPhotos();
    </script>
</body>
</html>
