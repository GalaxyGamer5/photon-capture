<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediathek | Photon Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .filters { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 0.5rem 1.5rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .photo-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; }
        .photo-info { padding: 1rem; font-size: 0.8rem; }
        .photo-name { font-weight: 600; margin-bottom: 0.2rem; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .photo-meta { color: var(--text-secondary); display: flex; justify-content: space-between; }
        .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
        .badge-portfolio { background: #4a90e2; color: white; }
        .badge-gallerien { background: #e2a04a; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 2rem; }
        .modal-content { max-width: 90%; max-height: 90%; object-fit: contain; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; color: white; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="welcome-text">
                <a href="dashboard.html" style="color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-bottom: 0.5rem; display: block;">&larr; Zurück zum Dashboard</a>
                <h1>Mediathek</h1>
                <p>Alle hochgeladenen Fotos auf deinem Server</p>
            </div>
            <div id="stats-badge" class="filter-btn" style="cursor: default;">Lädt...</div>
        </header>

        <div class="filters">
            <button class="filter-btn active" onclick="filterPhotos('all')">Alle</button>
            <button class="filter-btn" onclick="filterPhotos('Portfolio')">Portfolio</button>
            <button class="filter-btn" onclick="filterPhotos('Gallerien')">Kundenbilder</button>
        </div>

        <div class="grid" id="photo-grid">
            <!-- Photos via JS -->
        </div>
    </div>

    <div id="photo-modal" class="modal" onclick="this.style.display='none'">
        <span class="close-modal">&times;</span>
        <img id="modal-img" class="modal-content">
    </div>

    <script>
        if (sessionStorage.getItem('photon_admin_auth') !== 'true') window.location.href = 'index.html';

        let allPhotos = [];
        let currentFilter = 'all';

        async function fetchPhotos() {
            try {
                const res = await fetch('api/get-all-server-photos.php');
                const data = await res.json();
                allPhotos = data.photos;
                document.getElementById('stats-badge').textContent = `${data.count} Fotos gefunden`;
                renderPhotos();
            } catch (e) {
                document.getElementById('photo-grid').innerHTML = '<p>Fehler beim Laden der Fotos</p>';
            }
        }

        function renderPhotos() {
            const grid = document.getElementById('photo-grid');
            const filtered = currentFilter === 'all' ? allPhotos : allPhotos.filter(p => p.source === currentFilter);
            
            grid.innerHTML = filtered.map(p => `
                <div class="photo-card">
                    <img src="${p.url}" class="photo-img" onclick="openModal('${p.url}')" loading="lazy">
                    <div class="photo-info">
                        <div class="photo-name" title="${p.name}">${p.name}</div>
                        <div class="photo-meta">
                            <span>${p.size}</span>
                            <span class="badge badge-${p.source.toLowerCase()}">${p.source}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterPhotos(source) {
            currentFilter = source;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(source === 'all' ? 'Alle' : (source === 'Portfolio' ? 'Portfolio' : 'Kundenbilder')));
            });
            renderPhotos();
        }

        function openModal(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('photo-modal').style.display = 'flex';
        }

        fetchPhotos();
    </script>
</body>
</html>
