<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie Verwalten | Photon Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; background: var(--surface-dark); border: 1px solid var(--border); aspect-ratio: 1; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s; }
        .gallery-item img.loading { opacity: 0; }
        .gallery-item img.loaded  { opacity: 1; }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(255, 77, 77, 0.9); color: white; border: none; border-radius: 4px; padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.8rem; z-index: 2; }
        .delete-btn:hover { background: #ff3333; }
        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 3rem 2rem; text-align: center; margin-bottom: 2rem; cursor: pointer; background: rgba(255,255,255,0.02); transition: all 0.2s; }
        .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.05); }
        #progress-bar { height: 4px; background: var(--accent); width: 0%; transition: width 0.3s; margin-top: 1rem; border-radius: 2px; }

        /* Shimmer skeleton shown before thumbnail loads */
        .gallery-skeleton {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-dark);
            border: 1px solid var(--border);
            aspect-ratio: 1;
        }
        .gallery-skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255,255,255,0.06) 40%,
                rgba(255,255,255,0.12) 50%,
                rgba(255,255,255,0.06) 60%,
                transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }

        /* Sentinel element that triggers next batch */
        #gallery-sentinel { height: 8px; grid-column: 1 / -1; }
        #gallery-load-info { text-align: center; padding: 1rem; color: var(--text-secondary); font-size: 0.85rem; grid-column: 1 / -1; }

        /* Batch-select checkbox overlay */
        .gallery-item .item-checkbox {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .gallery-item.selected .item-checkbox {
            background: var(--accent, #6c63ff);
            border-color: var(--accent, #6c63ff);
        }
        .gallery-item.selected .item-checkbox::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
        }
        .gallery-item.selected {
            outline: 3px solid var(--accent, #6c63ff);
            outline-offset: -3px;
        }

        /* Batch toolbar */
        #batch-toolbar {
            display: none;
            align-items: center;
            gap: 1rem;
            background: rgba(255,77,77,0.12);
            border: 1px solid rgba(255,77,77,0.3);
            border-radius: 8px;
            padding: 0.75rem 1.25rem;
            margin-bottom: 1rem;
        }
        #batch-toolbar.visible { display: flex; }
        #batch-toolbar span { flex: 1; font-weight: 600; color: #ff6b6b; }
        #batch-delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        #batch-delete-btn:hover { background: #e03333; }
        #batch-clear-btn {
            background: rgba(255,255,255,0.08);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        #batch-clear-btn:hover { background: rgba(255,255,255,0.14); }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header > div { width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.5rem; }
            .upload-area { padding: 1.5rem 1rem; }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <header class="header">
            <div>
                <h1 id="pageTitle">Galerie laden...</h1>
                <p><a href="users.html" style="color: var(--accent); text-decoration: none;">&larr; Zurück zur Kundenübersicht</a></p>
            </div>
            <div>
                <span id="imageCountBadge" class="badge" style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; font-size: 1rem;">0 Bilder</span>
            </div>
        </header>

        <section class="upload-section">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent); margin-bottom: 1rem;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h3>Fotos hochladen</h3>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Klicken oder Dateien hierher ziehen (JPG, PNG)</p>
                <input type="file" id="fileInput" multiple accept="image/jpeg, image/png" style="display: none;">
                <div id="progress-bar-container" style="display: none; width: 100%; background: var(--surface-dark); border-radius: 2px; margin-top: 1.5rem;">
                    <div id="progress-bar"></div>
                </div>
                <div id="upload-status" style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-secondary);"></div>
            </div>
        </section>

        <section>
            <h2>Hochgeladene Fotos</h2>
            <!-- Batch-delete toolbar -->
            <div id="batch-toolbar">
                <span id="batch-label">0 ausgewählt</span>
                <button id="batch-clear-btn" onclick="clearSelection()">Auswahl aufheben</button>
                <button id="batch-delete-btn" onclick="batchDelete()">🗑 Ausgewählte löschen</button>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Javascript will populate this -->
            </div>
        </section>
    </div>

    <script>
        // Auth check
        if (sessionStorage.getItem('photon_admin_auth') !== 'true') window.location.href = 'index.html';

        const params = new URLSearchParams(window.location.search);
        const usernameParam = params.get('user');
        if (!usernameParam) window.location.href = 'users.html';

        let currentUser = null;
        let usersData   = null;
        /** Actual list of filenames fetched from the server (e.g. ['1.jpg','2.jpg',...]) */
        let imageFiles  = [];
        /** Set of selected filenames for batch-delete */
        const selectedFiles = new Set();

        async function init() {
            try {
                // Fetch the users database
                const response = await fetch('api/get_users.php');
                const text = await response.text();
                const jsonStr = text.match(/window\.usersDatabase\s*=\s*({[\s\S]*?});/)[1];
                usersData = JSON.parse(jsonStr);

                // Find the user
                currentUser = usersData.users.find(u => u.username === usernameParam);
                if (!currentUser) throw new Error("Benutzer nicht gefunden");

                document.getElementById('pageTitle').innerText = 'Galerie: ' + currentUser.name;

                // Fetch the actual list of filenames from the server so we always
                // delete the correct file (the backend renumbers after each deletion).
                await fetchImageList();
            } catch (e) {
                alert("Fehler beim Laden: " + e.message);
                window.location.href = 'users.html';
            }
        }

        async function fetchImageList() {
            // list-gallery-files.php scans the actual folder on disk so we always
            // get the real, current filenames (after any rename that followed a deletion).
            try {
                const r = await fetch(`api/list-gallery-files.php?folder=${encodeURIComponent(currentUser.folder)}`);
                const d = await r.json();
                if (d && d.success && Array.isArray(d.files)) {
                    imageFiles = d.files;
                } else {
                    throw new Error('bad response');
                }
            } catch (_) {
                // Fallback: derive from imageCount stored in users.js
                const count = currentUser.imageCount || 0;
                imageFiles = [];
                for (let i = 1; i <= count; i++) imageFiles.push(i + '.jpg');
            }
            selectedFiles.clear();
            updateBatchToolbar();
            updateGrid();
        }

        // ── Lazy-batch gallery renderer ──────────────────────────────────────
        const BATCH_SIZE = 30;
        let renderedUpTo = 0;
        let sentinelObserver = null;

        function updateGrid() {
            const count = imageFiles.length;
            renderedUpTo = 0;

            document.getElementById('imageCountBadge').innerText = count + ' Bilder';

            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (count === 0) {
                grid.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1/-1;">Noch keine Fotos hochgeladen. Lade jetzt welche hoch!</p>';
                return;
            }

            if (sentinelObserver) sentinelObserver.disconnect();

            renderBatch(grid);

            const sentinel = document.createElement('div');
            sentinel.id = 'gallery-sentinel';
            grid.appendChild(sentinel);

            const loadInfo = document.createElement('div');
            loadInfo.id = 'gallery-load-info';
            updateLoadInfo(loadInfo, count);
            grid.appendChild(loadInfo);

            sentinelObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && renderedUpTo < imageFiles.length) {
                    renderBatch(grid);
                    updateLoadInfo(loadInfo, imageFiles.length);
                }
            }, { rootMargin: '400px' });

            sentinelObserver.observe(sentinel);
        }

        function renderBatch(grid) {
            const sentinel = document.getElementById('gallery-sentinel');
            const start = renderedUpTo;
            const end   = Math.min(renderedUpTo + BATCH_SIZE, imageFiles.length);

            for (let idx = start; idx < end; idx++) {
                const filename = imageFiles[idx];
                const relPath  = `gallery/assets/${currentUser.folder}/${filename}`;
                const thumbUrl = `api/get-gallery-image.php?f=${encodeURIComponent(currentUser.folder)}&i=${encodeURIComponent(filename)}&thumb=1`;

                const item = document.createElement('div');
                item.className = 'gallery-skeleton';
                item.dataset.relpath = relPath;
                item.dataset.filename = filename;

                // Checkbox for batch-select
                const checkbox = document.createElement('div');
                checkbox.className = 'item-checkbox';
                checkbox.title = 'Auswählen';
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSelect(item, relPath);
                });

                const img = document.createElement('img');
                img.alt = filename;
                img.loading = 'lazy';
                img.className = 'loading';
                img.onload = () => {
                    img.classList.replace('loading', 'loaded');
                    item.classList.replace('gallery-skeleton', 'gallery-item');
                };
                img.onerror = () => {
                    item.classList.replace('gallery-skeleton', 'gallery-item');
                };
                img.src = thumbUrl;

                // Single-delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = 'Löschen';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteImages([relPath]);
                });

                const badge = document.createElement('div');
                badge.style.cssText = 'position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;font-size:0.75rem;z-index:2;';
                badge.textContent = filename;

                item.appendChild(img);
                item.appendChild(checkbox);
                item.appendChild(delBtn);
                item.appendChild(badge);

                // Clicking the card itself also toggles selection
                item.addEventListener('click', () => toggleSelect(item, relPath));

                grid.insertBefore(item, sentinel);
            }

            renderedUpTo = end;

            if (renderedUpTo >= imageFiles.length && sentinelObserver) {
                sentinelObserver.disconnect();
                sentinelObserver = null;
            }
        }

        function updateLoadInfo(el, total) {
            if (renderedUpTo >= total) {
                el.textContent = `Alle ${total} Bilder geladen`;
            } else {
                el.textContent = `${renderedUpTo} von ${total} Bildern geladen – scrollen für mehr`;
            }
        }
        // ── End lazy-batch renderer ──────────────────────────────────────────

        // ── Selection helpers ────────────────────────────────────────────────
        function toggleSelect(item, relPath) {
            if (selectedFiles.has(relPath)) {
                selectedFiles.delete(relPath);
                item.classList.remove('selected');
            } else {
                selectedFiles.add(relPath);
                item.classList.add('selected');
            }
            updateBatchToolbar();
        }

        function clearSelection() {
            selectedFiles.clear();
            document.querySelectorAll('.gallery-item.selected').forEach(el => el.classList.remove('selected'));
            updateBatchToolbar();
        }

        function updateBatchToolbar() {
            const toolbar = document.getElementById('batch-toolbar');
            const label   = document.getElementById('batch-label');
            const n = selectedFiles.size;
            if (n > 0) {
                toolbar.classList.add('visible');
                label.textContent = `${n} Bild${n === 1 ? '' : 'er'} ausgewählt`;
            } else {
                toolbar.classList.remove('visible');
            }
        }

        async function batchDelete() {
            const paths = Array.from(selectedFiles);
            if (paths.length === 0) return;
            if (!confirm(`Möchtest du ${paths.length} Bild${paths.length === 1 ? '' : 'er'} wirklich löschen?`)) return;
            await deleteImages(paths);
        }
        // ────────────────────────────────────────────────────────────────────

        async function deleteImages(paths) {
            try {
                const res = await fetch('api/delete-media.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paths })
                });
                const data = await res.json();
                if (data.success) {
                    // Re-fetch user data AND the real file list so indices are correct
                    await init();
                } else {
                    alert("Fehler beim Löschen: " + (data.errors ? data.errors.join(', ') : 'Unbekannter Fehler'));
                }
            } catch (e) {
                alert("Verbindungsfehler");
            }
        }

        // Upload Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFiles(e.target.files);
        });

        async function handleFiles(files) {
            if (!currentUser) return;
            const validFiles = Array.from(files).filter(f => f.type === 'image/jpeg' || f.type === 'image/png');
            if (validFiles.length === 0) return alert("Nur JPG und PNG erlaubt");

            document.getElementById('progress-bar-container').style.display = 'block';
            const statusLabel = document.getElementById('upload-status');
            const progressBar = document.getElementById('progress-bar');
            
            statusLabel.innerText = "Komprimiere Fotos und lade hoch...";
            progressBar.style.width = '10%';

            // In a real optimized system, we could compress here before sending.
            // For now, directly upload to the existing upload-photos.php endpoint
            const formData = new FormData();
            formData.append('galleryId', currentUser.id);
            for (let f of validFiles) formData.append('photos[]', f);

            try {
                // Using XMLHttpRequest for upload progress tracking
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'api/upload-photos.php', true);
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = Math.max(10, percent) + '%';
                        statusLabel.innerText = `Lade hoch... ${Math.round(percent)}%`;
                    }
                };

                xhr.onload = () => {
                    document.getElementById('progress-bar-container').style.display = 'none';
                    if (xhr.status === 200) {
                        try {
                            const res = JSON.parse(xhr.responseText);
                            if (res.success) {
                                statusLabel.innerText = `${res.uploaded} Fotos erfolgreich hochgeladen!`;
                                init(); // Refresh
                            } else {
                                alert("Upload Fehler: " + res.error);
                                statusLabel.innerText = "Fehler aufgetreten.";
                            }
                        } catch (e) {
                            alert("Server Fehler aufgetreten");
                        }
                    }
                };
                xhr.send(formData);
            } catch (e) {
                alert("Upload failed");
                document.getElementById('progress-bar-container').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
