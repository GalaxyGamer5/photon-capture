<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preise Verwalten | Photon Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pricing-admin-container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: var(--surface-light); border-radius: 12px; border: 1px solid var(--border-color); padding: 1.5rem; margin-bottom: 2rem; }
        .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .form-group { flex: 1; min-width: 0; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); }
        .btn-small { background: rgba(255, 255, 255, 0.1); border: none; color: var(--text-primary); padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-top: 0.5rem; }
        .btn-delete { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); margin-left: 0.5rem; }
        #save-status { margin-left: 1rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <div class="welcome-text">
                <h1>Preise Verwalten</h1>
                <p><a href="dashboard.html" style="color: var(--accent); text-decoration: none;">&larr; Zurück</a></p>
            </div>
            <div style="display: flex; align-items: center;">
                <button onclick="savePricing();" class="btn" id="save-btn">Änderungen Speichern</button>
                <div id="save-status"></div>
            </div>
        </header>

        <div class="pricing-admin-container" id="editor-container">
            <div style="text-align: center; padding: 4rem;">Lade Daten...</div>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('photon_admin_auth') !== 'true') window.location.href = 'index.html';

        let pricingData = null;
        const container = document.getElementById('editor-container');

        async function loadPricing() {
            try {
                const res = await fetch('api/get-pricing.php?t=' + Date.now());
                pricingData = await res.json();
                render();
            } catch (e) {
                container.innerHTML = '<div style="color:red">Fehler beim Laden: ' + e.message + '</div>';
            }
        }

        function render() {
            if (!pricingData) return;
            let html = '';
            
            pricingData.packages.forEach((pkg, pkgIdx) => {
                html += `
                <div class="card">
                    <h3>Paket: ${pkg.id.toUpperCase()}</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Titel (DE)</label>
                            <input type="text" value="${pkg.title.de}" oninput="update('packages', ${pkgIdx}, 'title', 'de', this.value)">
                        </div>
                        <div class="form-group">
                            <label>Preis (€)</label>
                            <input type="text" value="${pkg.price}" oninput="updateVal('packages', ${pkgIdx}, 'price', this.value)">
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        window.update = (path, idx, prop, lang, val) => {
            if (lang) pricingData[path][idx][prop][lang] = val;
            else pricingData[path][idx][prop] = val;
        }
        window.updateVal = (path, idx, prop, val) => {
            let n = parseFloat(val.replace(',', '.'));
            pricingData[path][idx][prop] = isNaN(n) ? 0 : n;
        }

        async function savePricing() {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('save-status');
            btn.disabled = true;
            status.textContent = "Speichere...";
            status.style.color = "white";

            try {
                const res = await fetch('api/manage-pricing.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pricingData)
                });
                const result = await res.json();
                if (result.success) {
                    status.textContent = "Gespeichert!";
                    status.style.color = "#4caf50";
                } else {
                    status.textContent = "Fehler: " + result.error;
                    status.style.color = "#ff4d4d";
                }
            } catch (e) {
                status.textContent = "Netzwerkfehler";
                status.style.color = "#ff4d4d";
            }
            btn.disabled = false;
            setTimeout(() => { status.textContent = ''; }, 3000);
        }

        loadPricing();
    </script>
</body>
</html>
